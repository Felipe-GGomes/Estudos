<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felipe Gomes — Power Farm (Calendário de Elite)</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ==========================================================================
           1. VARIÁVEIS CSS E CONFIGURAÇÕES GERAIS
           ========================================================================== */
        :root {
            /* Cores de Fundo e Superfícies */
            --bg: #080810;
            --s1: #0f0f1a;
            --s2: #161625;
            --s3: #1e1e30;
            
            /* Bordas e Textos */
            --border: rgba(255, 255, 255, 0.06);
            --border2: rgba(255, 255, 255, 0.12);
            --text: #e8e8f0;
            --muted: #5a5a7a;
            --muted2: #8888aa;
            
            /* Cores de Categorias (Tags) */
            --work: #3b82f6;      /* Azul - Trabalho */
            --aula: #ef4444;      /* Vermelho - Faculdade */
            --ic: #6b7280;        /* Cinza - Iniciação Científica */
            --coursera: #f59e0b;  /* Laranja - Cursos/Grind */
            --livre: #8b5cf6;     /* Roxo - ERP / Lazer / LoL */
            --revisao: #10b981;   /* Verde - Revisão */
            
            /* Sistema */
            --check: #10b981;
            --danger: #ef4444;
            
            /* Tipografia */
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Sora', sans-serif;
            --radius: 10px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
            transition: box-shadow 0.5s ease, border 0.5s ease;
        }

        /* --------------------------------------------------------------------------
           EFEITOS DE ALERTA - NEXUS DOWN
           -------------------------------------------------------------------------- */
        body.nexus-warning {
            box-shadow: inset 0 0 50px rgba(239, 68, 68, 0.15);
        }
        
        body.nexus-critical {
            box-shadow: inset 0 0 100px rgba(239, 68, 68, 0.4);
            border: 2px solid var(--danger);
        }

        /* ==========================================================================
           2. LAYOUT PRINCIPAL
           ========================================================================== */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* ==========================================================================
           3. SIDEBAR (MENU LATERAL)
           ========================================================================== */
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: var(--s1);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 28px 0 24px;
            position: sticky;
            top: 0;
            height: 100vh;
            z-index: 10;
        }

        .sidebar-logo {
            padding: 0 24px 24px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-name {
            font-family: var(--mono);
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -.01em;
        }

        .sidebar-sub {
            font-size: 11px;
            color: var(--muted2);
            margin-top: 3px;
            letter-spacing: .03em;
        }

        /* --------------------------------------------------------------------------
           Módulos do Coursera
           -------------------------------------------------------------------------- */
        .mini-cal {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .mini-cal-title {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            letter-spacing: .1em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .month-track {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .month-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            background: var(--s2);
            border: 1px solid transparent;
            transition: all .2s ease;
            opacity: 0.6;
        }

        .month-item.active {
            border-color: var(--coursera);
            background: rgba(245, 158, 11, 0.06);
            opacity: 1;
        }

        .month-badge {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 4px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .mb-1 { background: rgba(59, 130, 246, 0.2); color: #93c5fd; }
        .mb-2 { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        .mb-3 { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
        .mb-4 { background: rgba(139, 92, 246, 0.2); color: #c4b5fd; }

        .month-info {
            flex: 1;
            min-width: 0;
        }

        .month-label {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted2);
        }

        .month-course {
            font-size: 11px;
            font-weight: 500;
            color: var(--text);
            margin-top: 2px;
            line-height: 1.35;
        }

        /* --------------------------------------------------------------------------
           Navegação do Calendário (Acordeão de Semanas)
           -------------------------------------------------------------------------- */
        .calendar-nav {
            padding: 16px;
            flex: 1;
            overflow-y: auto;
        }

        .calendar-nav::-webkit-scrollbar {
            width: 6px;
        }

        .calendar-nav::-webkit-scrollbar-track {
            background: transparent;
        }

        .calendar-nav::-webkit-scrollbar-thumb {
            background: var(--s3);
            border-radius: 10px;
        }

        .month-divider {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: .05em;
            text-transform: uppercase;
            margin: 16px 8px 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .week-group {
            margin-bottom: 8px;
        }

        .week-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--s2);
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted2);
            transition: all .2s;
            border: 1px solid var(--border);
        }

        .week-header:hover {
            background: var(--s3);
            color: var(--text);
        }

        .week-header.open {
            border-color: var(--border2);
        }

        .week-header.done {
            text-decoration: line-through;
            opacity: 0.5;
            border-color: transparent;
        }

        .week-header.done::after {
            content: '✓';
            color: var(--check);
            font-size: 12px;
        }

        .week-days {
            display: none;
            flex-direction: column;
            padding-left: 12px;
            border-left: 1px solid var(--border);
            margin-left: 16px;
            margin-top: 6px;
            gap: 2px;
        }

        .week-days.open {
            display: flex;
        }

        .day-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--muted2);
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 400;
            cursor: pointer;
            text-align: left;
            transition: all .15s;
        }

        .day-btn:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
        }

        .day-btn.active {
            background: var(--s3);
            color: var(--text);
            font-weight: 600;
            border-left: 2px solid var(--coursera);
            border-radius: 0 6px 6px 0;
        }

        .day-date-num {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            width: 20px;
            text-align: right;
        }

        .day-btn.active .day-date-num {
            color: var(--coursera);
        }

        .day-btn.is-today .day-date-num {
            color: var(--work);
            font-weight: 700;
        }

        .day-week-name {
            flex: 1;
        }

        .day-count {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            background: var(--bg);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* --------------------------------------------------------------------------
           Rodapé da Sidebar (Progresso e Backup)
           -------------------------------------------------------------------------- */
        .sidebar-footer {
            padding: 16px 24px 0;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .prog-label {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .prog-bar {
            height: 4px;
            background: var(--s3);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .prog-fill {
            height: 100%;
            background: var(--coursera);
            border-radius: 2px;
            transition: width .4s ease;
        }

        .backup-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .backup-btn {
            flex: 1;
            background: var(--s2);
            border: 1px solid var(--border);
            color: var(--muted2);
            font-family: var(--mono);
            font-size: 10px;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all .2s;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        .backup-btn:hover {
            background: var(--s3);
            color: var(--text);
            border-color: var(--border2);
        }

        /* ==========================================================================
           4. ÁREA PRINCIPAL (TIMELINE)
           ========================================================================== */
        .main {
            flex: 1;
            min-width: 0;
            padding: 32px 28px 120px;
            height: 100vh;
            overflow-y: auto;
            position: relative;
        }

        .main-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .main-day-name {
            font-family: var(--mono);
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 700;
            letter-spacing: -.02em;
            line-height: 1.1;
        }

        .main-day-name span {
            color: var(--coursera);
        }

        .main-meta {
            font-size: 13px;
            color: var(--muted2);
            margin-top: 8px;
        }

        .header-right {
            text-align: right;
        }

        .today-date {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text);
            letter-spacing: .02em;
        }

        .check-summary {
            font-size: 12px;
            color: var(--muted2);
            margin-top: 4px;
        }

        .check-summary b {
            color: var(--check);
        }

        .reset-btn {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            background: none;
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 6px;
            letter-spacing: .05em;
            transition: all .15s;
            display: block;
            margin-left: auto;
        }

        .reset-btn:hover {
            border-color: var(--border2);
            color: var(--muted2);
        }

        /* --------------------------------------------------------------------------
           Blocos da Timeline (Cards)
           -------------------------------------------------------------------------- */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .block-wrap {
            opacity: 0;
            transform: translateY(10px);
            animation: rise .3s forwards;
        }

        @keyframes rise {
            to { opacity: 1; transform: translateY(0); }
        }

        .block-card {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: border-color .2s;
            border-left: 4px solid transparent;
        }

        .block-card:hover {
            border-color: var(--border2);
        }

        .block-card.done {
            opacity: .5;
        }

        .block-card.done .block-title {
            text-decoration: line-through;
        }

        /* Cores da Borda Esquerda (Baseado na Categoria) */
        .type-work { border-left-color: var(--work); }
        .type-aula { border-left-color: var(--aula); }
        .type-ic { border-left-color: var(--ic); }
        .type-coursera { border-left-color: var(--coursera); }
        .type-livre { border-left-color: var(--livre); }
        .type-revisao { border-left-color: var(--revisao); }

        .block-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            cursor: pointer;
            user-select: none;
        }

        .block-check {
            width: 20px;
            height: 20px;
            border-radius: 5px;
            border: 1.5px solid var(--border2);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
            cursor: pointer;
        }

        .block-check:hover {
            border-color: var(--check);
        }

        .block-check.checked {
            background: var(--check);
            border-color: var(--check);
        }

        .block-check.checked::after {
            content: '✓';
            font-size: 11px;
            color: #fff;
            font-weight: 700;
        }

        .block-time-range {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted2);
            flex-shrink: 0;
            min-width: 100px;
        }

        .block-time-range b {
            color: var(--text);
        }

        .block-center {
            flex: 1;
            min-width: 0;
        }

        .block-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.3;
        }

        .block-tagrow {
            display: flex;
            gap: 5px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .btag {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: .04em;
            padding: 2px 7px;
            border-radius: 3px;
        }

        .btag-work { background: rgba(59, 130, 246, 0.15); color: #93c5fd; }
        .btag-aula { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
        .btag-ic { background: rgba(107, 114, 128, 0.2); color: #9ca3af; }
        .btag-coursera { background: rgba(245, 158, 11, 0.15); color: #fcd34d; }
        .btag-livre { background: rgba(139, 92, 246, 0.15); color: #c4b5fd; }
        .btag-revisao { background: rgba(16, 185, 129, 0.15); color: #6ee7b7; }

        .block-duration {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            background: var(--s2);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .block-chevron {
            color: var(--muted);
            font-size: 12px;
            flex-shrink: 0;
            transition: transform .2s;
        }

        .block-chevron.open {
            transform: rotate(90deg);
        }

        .block-body {
            display: none;
            padding: 0 16px 16px 48px;
            border-top: 1px solid var(--border);
        }

        .block-body.open {
            display: block;
            padding-top: 14px;
        }

        .block-desc {
            font-size: 13px;
            color: var(--muted2);
            line-height: 1.7;
            margin-bottom: 12px;
        }

        .block-tasks {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 14px;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 12px;
            color: var(--muted2);
            line-height: 1.5;
        }

        .task-item::before {
            content: '→';
            color: var(--coursera);
            font-family: var(--mono);
            flex-shrink: 0;
            margin-top: 1px;
        }

        .block-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .blink {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--coursera);
            text-decoration: none;
            padding: 6px 12px;
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 6px;
            transition: all .15s;
            letter-spacing: .03em;
        }

        .blink:hover {
            background: rgba(245, 158, 11, 0.08);
            border-color: var(--coursera);
        }

        .blink::after {
            content: '↗';
            font-size: 10px;
        }

        .blink.blue { color: #93c5fd; border-color: rgba(59, 130, 246, 0.3); }
        .blink.blue:hover { background: rgba(59, 130, 246, 0.08); border-color: #93c5fd; }
        .blink.green { color: #6ee7b7; border-color: rgba(16, 185, 129, 0.3); }
        .blink.green:hover { background: rgba(16, 185, 129, 0.08); border-color: #6ee7b7; }
        .blink.purple { color: #c4b5fd; border-color: rgba(139, 92, 246, 0.3); }
        .blink.purple:hover { background: rgba(139, 92, 246, 0.08); border-color: #c4b5fd; }

        /* ==========================================================================
           5. WIDGETS FLUTUANTES (TIMER E NOTAS)
           ========================================================================== */
        .widgets-container {
            position: fixed;
            bottom: 24px;
            right: 28px;
            display: flex;
            gap: 12px;
            z-index: 50;
        }

        .widget-btn {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--s2);
            border: 1px solid var(--border2);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
        }

        .widget-btn:hover {
            background: var(--s3);
            transform: translateY(-2px);
        }

        /* --------------------------------------------------------------------------
           Timer Anti-IA Panel
           -------------------------------------------------------------------------- */
        .timer-panel {
            position: absolute;
            bottom: 60px;
            right: 0;
            background: var(--s1);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 16px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 160px;
        }

        .timer-panel.open {
            display: flex;
        }

        .timer-display {
            font-family: var(--mono);
            font-size: 32px;
            font-weight: 700;
            color: var(--coursera);
            letter-spacing: 2px;
        }

        .timer-controls {
            display: flex;
            gap: 8px;
        }

        .timer-ctrl-btn {
            background: var(--s3);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--mono);
            font-size: 11px;
            text-transform: uppercase;
        }

        .timer-ctrl-btn:hover {
            background: var(--s2);
            border-color: var(--coursera);
        }

        /* --------------------------------------------------------------------------
           Scratchpad Panel (Buffer N2)
           -------------------------------------------------------------------------- */
        .scratchpad-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: var(--s1);
            border-left: 1px solid var(--border);
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .scratchpad-panel.open {
            right: 0;
        }

        .sp-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sp-title {
            font-family: var(--mono);
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        .sp-close {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 24px;
            cursor: pointer;
        }

        .sp-close:hover {
            color: var(--text);
        }

        .sp-textarea {
            flex: 1;
            width: 100%;
            background: transparent;
            border: none;
            padding: 24px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .sp-textarea::placeholder {
            color: var(--muted);
        }

        /* ==========================================================================
           6. DESIGN RESPONSIVO (MOBILE)
           ========================================================================== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -320px;
                z-index: 100;
                transition: left 0.3s ease;
            }

            .sidebar.open {
                left: 0;
            }

            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.6);
                z-index: 99;
            }

            .sidebar-overlay.show {
                display: block;
            }

            .mobile-menu {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 16px 20px;
                background: var(--s1);
                border-bottom: 1px solid var(--border);
                position: sticky;
                top: 0;
                z-index: 10;
                margin: -32px -28px 28px -28px;
            }

            .hamburger {
                width: 36px;
                height: 36px;
                border: 1px solid var(--border);
                border-radius: 8px;
                background: var(--s2);
                color: var(--text);
                font-size: 16px;
                cursor: pointer;
            }

            .mobile-title {
                font-family: var(--mono);
                font-size: 13px;
                font-weight: 700;
            }

            .main {
                padding: 32px 20px 100px;
            }

            .block-body {
                padding-left: 16px;
            }

            .scratchpad-panel {
                width: 100%;
                right: -100%;
            }
        }

        @media (min-width: 769px) {
            .mobile-menu {
                display: none;
            }
            .sidebar-overlay {
                display: none !important;
            }
        }
    </style>
</head>
<body>

        function calcDuration(start, end) {
            const toMin = t => { 
                const [h, m] = t.split(':').map(Number); 
                return h * 60 + m; 
            };
            
            let diff = toMin(end) - toMin(start);
            if (diff < 0) diff += 1440;
            
            const h = Math.floor(diff / 60);
            const min = diff % 60;
            
            return h > 0 ? (min > 0 ? `${h}h${min}min` : `${h}h`) : `${min}min`;
        }

        function getStorageKey(dateStr, blockId) { 
            return `felipe_check_${dateStr}_${blockId}`; 
        }

        function isChecked(dateStr, blockId) {
            try { 
                return localStorage.getItem(getStorageKey(dateStr, blockId)) === '1'; 
            } catch(e) { 
                return false; 
            }
        }

        function setChecked(dateStr, blockId, val) {
            try {
                if (val) {
                    localStorage.setItem(getStorageKey(dateStr, blockId), '1');
                } else {
                    localStorage.removeItem(getStorageKey(dateStr, blockId));
                }
            } catch(e) {}
        }

            if (!confirm('Tem certeza que deseja resetar todos os checks DESTE dia específico?')) return;
            
            const schedule = generateScheduleForDate(currentDateStr);

            renderSchedule();
            updateSidebarWeeks(); 
            updateProgress();
        }

        /* ==========================================================================
           5. SISTEMA DE EXPORTAÇÃO E IMPORTAÇÃO JSON (CLOUD BACKUP MANUAL)
           ========================================================================== */

        function exportBackup() {
            const data = {};
            
            // Adiciona as anotações do Scratchpad
            data['felipe_scratchpad'] = localStorage.getItem('felipe_scratchpad');
            
            // Adiciona todos os checkmarks
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('felipe_check_')) {
                    data[key] = localStorage.getItem(key);
                }
            }
            
            if(Object.keys(data).length <= 1 && !data['felipe_scratchpad']) {
                alert("Não há progresso ou anotações salvas para exportar ainda.");
                return;
            }

            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `power_farm_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    // Limpa as chaves antigas de checks e do bloco de notas
                    for (let i = localStorage.length - 1; i >= 0; i--) {
                        const key = localStorage.key(i);
                        if (key.startsWith('felipe_check_') || key === 'felipe_scratchpad') {
                            localStorage.removeItem(key);
                        }
                    }
                    
                    // Insere os novos dados
                    for (const key in data) {
                        if (data[key] !== null) {
                            localStorage.setItem(key, data[key]);
                        }
                    }
                    
                    alert('Progresso e anotações importados com sucesso!');
                    
                    // Recarrega a interface para aplicar os dados
                    selectDate(currentDateStr);
                    updateSidebarWeeks();
                    loadNotes();
                } catch (err) {
                    alert('Erro ao ler o arquivo. Tem certeza que é o JSON correto do Power Farm?');
                }
                event.target.value = ''; // Reseta o input
            };
            reader.readAsText(file);
        }

        /* ==========================================================================
           7. WIDGET: TIMER ANTI-IA (POMODORO 20 MIN)
           ========================================================================== */

        let timerInterval = null;
        let timeLeft = 20 * 60; // 20 minutos em segundos

        function toggleTimer() {
            document.getElementById('timer-panel').classList.toggle('open');
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').textContent = `${m}:${s}`;
        }

        function startTimer() {
            if (timerInterval) return; // Já está rodando
            
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerDisplay();
                } else {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    alert('Fim dos 20 minutos sem IA! Agora você pode abrir a IA ou voltar para o código.');
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = 20 * 60;
            updateTimerDisplay();
        }

        /* ==========================================================================
           8. SISTEMA: NEXUS DOWN ALERT (ALERTA DE FADIGA)
           ========================================================================== */

        function checkNexusStatus() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            
            // Limpa as classes de perigo
            document.body.classList.remove('nexus-warning', 'nexus-critical');

            // Lógica: 00:15 = Aviso Amarelo/Laranja | 00:30 até 04:00 = Crítico (Vai dormir)
            if (h === 0 && m >= 15 && m < 30) {
                document.body.classList.add('nexus-warning');
            } 
            else if ((h === 0 && m >= 30) || (h > 0 && h < 4)) {
                document.body.classList.add('nexus-critical');
            }
        }

        // Verifica a cada 60 segundos
        setInterval(checkNexusStatus, 60000);

        // 9.2 Renderiza o Calendário Lateral com Semanas Retráteis
        function renderCalendarNav() {
            const container = document.getElementById('calendar-nav');
            let html = '';
            let currentMonthLabel = '';
            let currentWeekNumber = 0;
            let weekHtml = '';
            
            const todayStr = new Date().toISOString().split('T')[0];

            calendarDays.forEach((dateStr, index) => {
                const [y, m, d] = dateStr.split('-');
                const dateObj = new Date(y, m - 1, d);
                const dayOfWeek = dateObj.getDay();
                const monthName = MONTH_NAMES[dateObj.getMonth()];
                
                // Lógica para injetar o divisor de mês
                if (monthName !== currentMonthLabel) {
                    if (weekHtml !== '') {
                        html += closeWeekGroup(currentWeekNumber, weekHtml);
                        weekHtml = '';
                    }
                    html += `<div class="month-divider">${monthName} ${y}</div>`;
                    currentMonthLabel = monthName;
                    currentWeekNumber++; 
                }

                // Lógica para iniciar uma nova semana (Toda Segunda-feira ou começo do array)
                if (dayOfWeek === 1 || index === 0 || weekHtml === '') {
                    if (weekHtml !== '') {
                        html += closeWeekGroup(currentWeekNumber, weekHtml);
                    }
                    currentWeekNumber++;
                    weekHtml = '';
                }

                const isToday = dateStr === todayStr ? 'is-today' : '';
                const isActive = dateStr === currentDateStr ? 'active' : '';
                const count = generateScheduleForDate(dateStr).blocks.length;

                // Garante que a semana com o dia atual aberto comece expandida
                if (isActive && openWeeks[`week-${currentWeekNumber}`] === undefined) {
                    openWeeks[`week-${currentWeekNumber}`] = true;
                }

                weekHtml += `
                    <button class="day-btn ${isActive} ${isToday}" onclick="selectDate('${dateStr}')" id="btn-${dateStr}">
                        <span class="day-date-num">${parseInt(d)}</span>
                        <span class="day-week-name">${DAY_NAMES[dayOfWeek].split('-')[0]}</span>
                        <span class="day-count">${count}</span>
                    </button>
                `;
            });

            // Fecha o último grupo de semana restante
            if (weekHtml !== '') {
                html += closeWeekGroup(currentWeekNumber, weekHtml);
            }
            
            container.innerHTML = html;
            updateSidebarWeeks(); 
        }

        // Helper para a sanfona de semanas
        function closeWeekGroup(weekId, content) {
            const isOpen = openWeeks[`week-${weekId}`] ? 'open' : '';
            return `
                <div class="week-group" id="wg-${weekId}">
                    <div class="week-header ${isOpen}" onclick="toggleWeekNav(${weekId})" id="wh-${weekId}">
                        <span>Semana ${weekId}</span>
                    </div>
                    <div class="week-days ${isOpen}" id="wd-${weekId}">
                        ${content}
                    </div>
                </div>
            `;
        }

        // Verifica se a semana foi concluída para colocar o strike-through (riscado)
        function updateSidebarWeeks() {
            document.querySelectorAll('.week-group').forEach(group => {
                const btns = group.querySelectorAll('.day-btn');
                let totalBlocks = 0;
                let doneBlocks = 0;
                
                btns.forEach(btn => {
                    const dateStr = btn.id.replace('btn-', '');
                    const sched = generateScheduleForDate(dateStr);
                    
                    sched.blocks.forEach(b => {
                        totalBlocks++;
                        if (isChecked(dateStr, b.id)) {
                            doneBlocks++;
                        }
                    });
                });

                const header = group.querySelector('.week-header');
                if (totalBlocks > 0 && totalBlocks === doneBlocks) {
                    header.classList.add('done');
                } else {
                    header.classList.remove('done');
                }
            });
        }

        function toggleWeekNav(weekId) {
            const key = `week-${weekId}`;
            openWeeks[key] = !openWeeks[key];
            
            const header = document.getElementById(`wh-${weekId}`);
            const days = document.getElementById(`wd-${weekId}`);
            
            if (openWeeks[key]) {
                header.classList.add('open');
                days.classList.add('open');
            } else {
                header.classList.remove('open');
                days.classList.remove('open');
            }
        }

        // 9.3 Renderiza a Timeline Central com os blocos de tarefas
        function renderSchedule() {
            const schedule = generateScheduleForDate(currentDateStr);
            const tl = document.getElementById('timeline');
            tl.innerHTML = '';

            // Atualiza os cabeçalhos
            document.getElementById('main-day-name').innerHTML = `${schedule.title} <span>${currentDateStr.split('-')[2]}</span>`;
            document.getElementById('main-meta').textContent = schedule.meta;
            
            const [y, m, d] = currentDateStr.split('-');
            document.getElementById('today-date').textContent = `${d} de ${MONTH_NAMES[parseInt(m)-1]} de ${y}`;

            schedule.blocks.forEach((b, i) => {
                const checked = isChecked(currentDateStr, b.id);
                const dur = calcDuration(b.start, b.end);

                // Tratamento HTML Condicional para Tasks e Links
                const tasksHtml = b.tasks.length > 0 ? 
                    `<div class="block-tasks">${b.tasks.map(t => `<div class="task-item">${t}</div>`).join('')}</div>` : '';
                
                const linksHtml = b.links.length > 0 ? 
                    `<div class="block-links">${b.links.map(l => `<a class="blink ${l.cls || ''}" href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`).join('')}</div>` : '';
                
                const tagsHtml = b.tags.map(t => `<span class="btag btag-${t.c}">${t.l}</span>`).join('');

                // Cria e adiciona o wrapper com animação
                const wrap = document.createElement('div');
                wrap.className = 'block-wrap';
                wrap.style.animationDelay = (i * 0.05) + 's';
                
                wrap.innerHTML = `
                    <div class="block-card type-${b.type} ${checked ? 'done' : ''}" id="card-${b.id}">
                        <div class="block-header" onclick="toggleBlock('${b.id}')">
                            
                            <div class="block-check ${checked ? 'checked' : ''}" id="chk-${b.id}"
                                 onclick="event.stopPropagation(); toggleCheck('${b.id}')"></div>
                            
                            <div class="block-time-range">
                                <b>${b.start}</b> – <b>${b.end}</b>
                            </div>
                            
                            <div class="block-center">
                                <div class="block-title">${b.title}</div>
                                <div class="block-tagrow">${tagsHtml}<span class="block-duration">${dur}</span></div>
                            </div>
                            
                            <div class="block-chevron" id="chev-${b.id}">▶</div>
                        </div>
                        
                        <div class="block-body" id="body-${b.id}">
                            <p class="block-desc">${b.desc}</p>
                            ${tasksHtml}
                            ${linksHtml}
                        </div>
                    </div>
                `;
                
                tl.appendChild(wrap);
            });

            updateCheckSummary(schedule);
        }

        // Abre/Fecha a descrição interna de um bloco
        function toggleBlock(id) {
            const body = document.getElementById('body-' + id);
            const chev = document.getElementById('chev-' + id);
            const open = body.classList.toggle('open');
            chev.classList.toggle('open', open);
        }

        // Ação de Marcar/Desmarcar atividade
        function toggleCheck(id) {
            const was = isChecked(currentDateStr, id);
            setChecked(currentDateStr, id, !was);
            
            document.getElementById('chk-' + id).classList.toggle('checked', !was);
            document.getElementById('card-' + id).classList.toggle('done', !was);
            
            updateCheckSummary(generateScheduleForDate(currentDateStr));
            updateProgress();
            updateSidebarWeeks(); 
        }

        function updateCheckSummary(schedule) {
            const total = schedule.blocks.length;
            const done = schedule.blocks.filter(b => isChecked(currentDateStr, b.id)).length;
            document.getElementById('check-summary').innerHTML = `<b>${done}</b> de ${total} concluídas hoje`;
        }

        // Calcula o Progresso em Barra apenas da SEMANA ativa
        function updateProgress() {
            const [y, m, d] = currentDateStr.split('-');
            const currDateObj = new Date(y, m - 1, d);
            const day = currDateObj.getDay();
            
            const diff = currDateObj.getDate() - day + (day === 0 ? -6 : 1);
            const startOfWeek = new Date(currDateObj.setDate(diff));

            let total = 0, done = 0;

            for (let i = 0; i < 7; i++) {
                const checkDate = new Date(startOfWeek);
                checkDate.setDate(startOfWeek.getDate() + i);
                const dStr = checkDate.toISOString().split('T')[0];
                
                if(calendarDays.includes(dStr)) {
                    const sched = generateScheduleForDate(dStr);
                    sched.blocks.forEach(b => {
                        total++;
                        if(isChecked(dStr, b.id)) {
                            done++;
                        }
                    });
                }
            }

            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
            document.getElementById('prog-fill').style.width = pct + '%';
            document.getElementById('prog-pct').textContent = pct + '%';
        }

        // Muda a visualização para o dia clicado
        function selectDate(dateStr) {
            currentDateStr = dateStr;
            renderAllModulesCard(); 
            renderCalendarNav(); 
            renderSchedule(); 
            updateProgress(); 

            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        }

        // Navegação Mobile
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }
        
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }

        /* ==========================================================================
           10. EXECUÇÃO INICIAL DE BOOT
           ========================================================================== */
        
        initCalendar();
        loadNotes();
        checkNexusStatus(); // Realiza a primeira checagem de horário
        
        // Pega a data de hoje, ou força para 01 de Abril se estiver testando fora do range
        const realToday = new Date().toISOString().split('T')[0];
        const initialDate = calendarDays.includes(realToday) ? realToday : calendarDays[0];

        // Renderiza e foca no dia
        setTimeout(() => {
            selectDate(initialDate);
            const btn = document.getElementById('btn-' + initialDate);
            if(btn) {
                btn.scrollIntoView({ block: 'center' });
            }
        }, 50);

    </script>
</body>
</html>
